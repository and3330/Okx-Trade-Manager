openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: account
    description: OKX account operations
  - name: market
    description: OKX market data
  - name: trade
    description: OKX trading operations
  - name: perp
    description: OKX USDT-margined perpetual (SWAP) trading
  - name: ai
    description: AI-powered analysis
  - name: auto
    description: Auto-trade engine
  - name: monitor
    description: Daily market monitor (watchlist, strategy signals)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /monitor/watchlist:
    get:
      operationId: listWatchlist
      tags: [monitor]
      summary: List all tracked symbols
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: addWatchlistItem
      tags: [monitor]
      summary: Add a symbol to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "200":
          description: Created watchlist item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /monitor/watchlist/{id}:
    delete:
      operationId: removeWatchlistItem
      tags: [monitor]
      summary: Remove a symbol from the watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /monitor/signals:
    get:
      operationId: listSignals
      tags: [monitor]
      summary: List recently received strategy signals
      responses:
        "200":
          description: Signal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitorSignal"

  /monitor/settings:
    get:
      operationId: getMonitorSettings
      tags: [monitor]
      summary: Get monitor settings (webhook passphrase for TradingView setup)
      responses:
        "200":
          description: Monitor settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorSettings"

  /monitor/webhook/tradingview:
    post:
      operationId: receiveTradingViewWebhook
      tags: [monitor]
      summary: Receive a TradingView alert webhook (validated by passphrase)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /okx/ai/analyze:
    post:
      operationId: analyzeMarket
      tags: [ai]
      summary: AI analysis of the current market for an instrument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalysisInput"
      responses:
        "200":
          description: AI-generated market analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysis"

  /okx/ai/recommend:
    post:
      operationId: recommendTrade
      tags: [ai]
      summary: Get parallel trade recommendations from multiple AI models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalysisInput"
      responses:
        "200":
          description: Recommendations from all configured models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecommendationsResponse"

  /okx/account/balance:
    get:
      operationId: getAccountBalance
      tags: [account]
      summary: Get OKX account balances
      responses:
        "200":
          description: Account balance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalance"

  /okx/account/summary:
    get:
      operationId: getAccountSummary
      tags: [account]
      summary: Get a high-level dashboard summary (totals, top assets, P&L hint)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummary"

  /okx/market/tickers:
    get:
      operationId: listTopTickers
      tags: [market]
      summary: List a curated set of top spot tickers
      responses:
        "200":
          description: Ticker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticker"

  /okx/market/ticker/{instId}:
    get:
      operationId: getTicker
      tags: [market]
      summary: Get a single ticker by instrument id (e.g. BTC-USDT)
      parameters:
        - name: instId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticker"

  /okx/market/candles/{instId}:
    get:
      operationId: getCandles
      tags: [market]
      summary: Get recent candles for a chart (1H, last ~100)
      parameters:
        - name: instId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candle list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /okx/trade/orders:
    get:
      operationId: listOrders
      tags: [trade]
      summary: List recent orders (open + filled, last 50)
      responses:
        "200":
          description: Order history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: placeOrder
      tags: [trade]
      summary: Place a market order on a spot pair (with optional stop-loss)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /okx/perp/tickers:
    get:
      operationId: listPerpTickers
      tags: [perp]
      summary: List a curated set of top USDT-margined perpetual tickers
      responses:
        "200":
          description: Perp ticker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpTicker"

  /okx/perp/instruments/{instId}:
    get:
      operationId: getPerpInstrument
      tags: [perp]
      summary: Get instrument metadata (contract size, lot size, max leverage)
      parameters:
        - name: instId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Instrument metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerpInstrument"

  /okx/perp/positions:
    get:
      operationId: listPerpPositions
      tags: [perp]
      summary: List currently open perpetual positions
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpPosition"

  /okx/perp/orders:
    post:
      operationId: placePerpOrder
      tags: [perp]
      summary: Open a perpetual market position with margin + leverage and optional TP/SL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerpOrderInput"
      responses:
        "201":
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerpOrderResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /okx/perp/orders/close:
    post:
      operationId: closePerpPosition
      tags: [perp]
      summary: Close an open perpetual position at market
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClosePerpInput"
      responses:
        "200":
          description: Close request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosePerpResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /okx/trade/orders/recent-fills:
    get:
      operationId: listRecentFills
      tags: [trade]
      summary: Recent filled trades activity feed
      responses:
        "200":
          description: Recent fills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fill"

  /okx/ai/research:
    post:
      operationId: runResearchPipeline
      tags: [ai]
      summary: Full 3-stage research pipeline (technical agent + sentiment agent + 4-model decision battle)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalysisInput"
      responses:
        "200":
          description: Pipeline result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResult"

  /okx/auto/config:
    get:
      operationId: getAutoTradeConfig
      tags: [auto]
      summary: Get auto-trade configuration (singleton)
      responses:
        "200":
          description: Current config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeConfig"
    put:
      operationId: updateAutoTradeConfig
      tags: [auto]
      summary: Update auto-trade configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoTradeConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeConfig"

  /okx/auto/status:
    get:
      operationId: getAutoTradeStatus
      tags: [auto]
      summary: Get current auto-trade engine status
      responses:
        "200":
          description: Engine status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeStatus"

  /okx/auto/kill:
    post:
      operationId: killAutoTrade
      tags: [auto]
      summary: Immediately disable auto-trade until manually re-enabled
      responses:
        "200":
          description: Killed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeStatus"

  /okx/auto/run-now:
    post:
      operationId: runAutoTradeCycleNow
      tags: [auto]
      summary: Force a single auto-trade cycle to run immediately (respects all guardrails)
      responses:
        "200":
          description: Run summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeRunResult"

  /okx/auto/decisions:
    get:
      operationId: listAutoTradeDecisions
      tags: [auto]
      summary: Recent AI decisions (auto + user-triggered)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Decisions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiDecisionRecord"

  /okx/auto/executions:
    get:
      operationId: listAutoTradeExecutions
      tags: [auto]
      summary: Recent auto-trade executions (placed + closed orders)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Executions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutoExecutionRecord"

  /okx/auto/leaderboard:
    get:
      operationId: getModelLeaderboard
      tags: [auto]
      summary: Per-model win rate / hit rate from past decisions
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

components:
  schemas:
    WatchlistItem:
      type: object
      required: [id, symbol, market, displayName, createdAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        market:
          type: string
          enum: [tw, us, crypto]
        displayName:
          type: string
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    WatchlistInput:
      type: object
      required: [symbol, market, displayName]
      properties:
        symbol:
          type: string
        market:
          type: string
          enum: [tw, us, crypto]
        displayName:
          type: string
        note:
          type: ["string", "null"]

    MonitorSignal:
      type: object
      required: [id, receivedAt, source]
      properties:
        id:
          type: integer
        receivedAt:
          type: string
          format: date-time
        symbol:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        source:
          type: string

    MonitorSettings:
      type: object
      required: [webhookPassphrase]
      properties:
        webhookPassphrase:
          type: string

    WebhookPayload:
      type: object
      required: [passphrase]
      properties:
        passphrase:
          type: string
        ticker:
          type: ["string", "null"]
        symbol:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        price:
          type: ["number", "string", "null"]
        message:
          type: ["string", "null"]

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: ["string", "null"]

    AssetBalance:
      type: object
      required: [ccy, available, frozen, equityUsd]
      properties:
        ccy:
          type: string
        available:
          type: number
        frozen:
          type: number
        equityUsd:
          type: number

    AccountBalance:
      type: object
      required: [totalEquityUsd, assets, updatedAt]
      properties:
        totalEquityUsd:
          type: number
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AssetBalance"
        updatedAt:
          type: string

    AccountSummary:
      type: object
      required: [totalEquityUsd, assetCount, topAssets, openOrderCount, updatedAt]
      properties:
        totalEquityUsd:
          type: number
        assetCount:
          type: integer
        openOrderCount:
          type: integer
        topAssets:
          type: array
          items:
            $ref: "#/components/schemas/AssetBalance"
        updatedAt:
          type: string

    Ticker:
      type: object
      required: [instId, last, open24h, high24h, low24h, vol24h, changePct24h]
      properties:
        instId:
          type: string
        last:
          type: number
        open24h:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        vol24h:
          type: number
        changePct24h:
          type: number

    Candle:
      type: object
      required: [ts, open, high, low, close, volume]
      properties:
        ts:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    Order:
      type: object
      required: [ordId, instId, side, ordType, state, sz, createdAt]
      properties:
        ordId:
          type: string
        instId:
          type: string
        side:
          type: string
          enum: [buy, sell]
        ordType:
          type: string
        state:
          type: string
        sz:
          type: number
        px:
          type: ["number", "null"]
        avgPx:
          type: ["number", "null"]
        notionalUsd:
          type: ["number", "null"]
        createdAt:
          type: string

    Fill:
      type: object
      required: [tradeId, instId, side, fillSz, fillPx, ts]
      properties:
        tradeId:
          type: string
        ordId:
          type: ["string", "null"]
        instId:
          type: string
        side:
          type: string
          enum: [buy, sell]
        fillSz:
          type: number
        fillPx:
          type: number
        ts:
          type: string

    OrderInput:
      type: object
      required: [instId, side, notionalUsd]
      properties:
        instId:
          type: string
          description: Spot instrument, e.g. BTC-USDT
        side:
          type: string
          enum: [buy, sell]
        notionalUsd:
          type: number
          description: Quote-currency notional to spend/receive (USDT amount)
          minimum: 0
        stopLossPrice:
          type: ["number", "null"]
          description: Optional stop-loss trigger price (attached as algo order)

    OrderResult:
      type: object
      required: [ordId, instId, side, status]
      properties:
        ordId:
          type: string
        instId:
          type: string
        side:
          type: string
        status:
          type: string
        algoId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]

    PerpTicker:
      type: object
      required: [instId, baseCcy, last, open24h, high24h, low24h, vol24h, changePct24h]
      properties:
        instId:
          type: string
        baseCcy:
          type: string
        last:
          type: number
        open24h:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        vol24h:
          type: number
        changePct24h:
          type: number

    PerpInstrument:
      type: object
      required: [instId, baseCcy, ctVal, lotSz, minSz, tickSz, maxLeverage]
      properties:
        instId:
          type: string
        baseCcy:
          type: string
        ctVal:
          type: number
        lotSz:
          type: number
        minSz:
          type: number
        tickSz:
          type: number
        maxLeverage:
          type: number

    PerpPosition:
      type: object
      required: [instId, posSide, contracts, baseQty, avgEntryPx, markPx, unrealizedPnlUsd, unrealizedPnlPct, marginUsd, leverage, marginMode, updatedAt]
      properties:
        instId:
          type: string
        posSide:
          type: string
          enum: [long, short, net]
        contracts:
          type: number
        baseQty:
          type: number
        avgEntryPx:
          type: number
        markPx:
          type: number
        unrealizedPnlUsd:
          type: number
        unrealizedPnlPct:
          type: number
        marginUsd:
          type: number
        leverage:
          type: number
        marginMode:
          type: string
          enum: [isolated, cross]
        liquidationPx:
          type: ["number", "null"]
        updatedAt:
          type: string

    PerpOrderInput:
      type: object
      required: [instId, side, marginUsdt, leverage]
      properties:
        instId:
          type: string
          description: Perpetual instrument, e.g. HYPE-USDT-SWAP
        side:
          type: string
          enum: [long, short]
        marginUsdt:
          type: number
          minimum: 0
          description: USDT margin to commit (notional = margin * leverage)
        leverage:
          type: integer
          minimum: 1
          maximum: 125
        takeProfitPrice:
          type: ["number", "null"]
        stopLossPrice:
          type: ["number", "null"]

    PerpOrderResult:
      type: object
      required: [ordId, instId, side, contracts, notionalUsd, markPx, leverage, status]
      properties:
        ordId:
          type: string
        instId:
          type: string
        side:
          type: string
          enum: [long, short]
        contracts:
          type: number
        notionalUsd:
          type: number
        markPx:
          type: number
        leverage:
          type: number
        status:
          type: string
        message:
          type: ["string", "null"]

    ClosePerpInput:
      type: object
      required: [instId]
      properties:
        instId:
          type: string
        posSide:
          type: ["string", "null"]
          enum: [long, short, net, null]
        marginMode:
          type: ["string", "null"]
          enum: [isolated, cross, null]

    ClosePerpResult:
      type: object
      required: [instId, status]
      properties:
        instId:
          type: string
        status:
          type: string

    AiAnalysisInput:
      type: object
      required: [instId]
      properties:
        instId:
          type: string
        mode:
          type: ["string", "null"]
          enum: [spot, perp, null]
          description: spot (default) or perp - changes the prompt for the AI
        marginUsdt:
          type: ["number", "null"]
          description: For perp mode, max USDT margin the AI may suggest committing
        maxLeverage:
          type: ["integer", "null"]
          description: For perp mode, max leverage the AI may suggest

    AiAnalysis:
      type: object
      required: [instId, analysis, generatedAt, model]
      properties:
        instId:
          type: string
        analysis:
          type: string
          description: Markdown-formatted analysis from the AI model
        generatedAt:
          type: string
        model:
          type: string

    AiRecommendation:
      type: object
      required: [providerId, providerLabel, model, latencyMs, ok]
      properties:
        providerId:
          type: string
          description: Stable id (anthropic | openai | gemini | openrouter)
        providerLabel:
          type: string
          description: Human-readable label (e.g. "Claude Sonnet 4.6")
        model:
          type: string
        latencyMs:
          type: integer
        ok:
          type: boolean
        error:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
          enum: [buy, sell, hold, long, short, close, null]
        sizeUsdt:
          type: ["number", "null"]
          description: Spot mode - suggested USDT notional. Perp mode - leave null.
        marginUsdt:
          type: ["number", "null"]
          description: Perp mode - suggested USDT margin (notional = margin * leverage)
        leverage:
          type: ["integer", "null"]
          description: Perp mode - suggested leverage (1 to maxLeverage)
        stopLossPrice:
          type: ["number", "null"]
        takeProfitPrice:
          type: ["number", "null"]
          description: Perp mode - optional take-profit trigger price
        confidence:
          type: ["integer", "null"]
          description: 1-10 self-reported confidence
        reasoning:
          type: ["string", "null"]

    AiRecommendationsResponse:
      type: object
      required: [instId, generatedAt, lastPrice, recommendations]
      properties:
        instId:
          type: string
        generatedAt:
          type: string
        lastPrice:
          type: number
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/AiRecommendation"

    ResearchResult:
      type: object
      required: [instId, mode, generatedAt, lastPrice, recommendations]
      properties:
        instId:
          type: string
        mode:
          type: string
          enum: [spot, perp]
        generatedAt:
          type: string
        lastPrice:
          type: number
        technicalSummary:
          type: ["string", "null"]
        sentimentSummary:
          type: ["string", "null"]
        indicatorTextByBar:
          type: ["string", "null"]
        contextText:
          type: ["string", "null"]
        fundingRate:
          type: ["number", "null"]
        openInterestCcy:
          type: ["number", "null"]
        longShortRatio:
          type: ["number", "null"]
        takerBuyRatio:
          type: ["number", "null"]
        atr1H:
          type: ["number", "null"]
