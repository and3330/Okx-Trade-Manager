kind = "web"
previewPath = "/"
title = "市場監測與交易平台"
version = "1.0.0"
id = "artifacts/market-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18144

[services.development]
run = "pnpm --filter @workspace/market-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/market-monitor", "run", "build" ]
publicDir = "artifacts/market-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18144"
BASE_PATH = "/"
